<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Isinya Township Secondary</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="text-slate-800 antialiased">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 flex-shrink-0 bg-slate-50 border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-green-200 text-xl">
                        <ion-icon name="school-outline"></ion-icon>
                    </div>
                    <span class="text-lg font-bold tracking-tight leading-tight">Isinya Township Secondary</span>
                </div>

                <div class="mb-6">
                    <div class="flex items-center gap-3 p-3 bg-white rounded-2xl border border-slate-200 mb-6">
                        <div class="w-10 h-10 bg-slate-200 rounded-full overflow-hidden text-2xl flex items-center justify-center">
                            <ion-icon name="person-circle-outline"></ion-icon>
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-sm font-semibold truncate">Principal</p>
                            <p class="text-xs text-slate-500">Admin Account</p>
                        </div>
                    </div>
                </div>

                <nav class="space-y-1">
                    <p class="text-[10px] uppercase font-bold text-slate-400 px-3 mb-2">Main Menu</p>
                    <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-slate-500 rounded-xl text-sm font-medium transition-all hover:bg-slate-100">
                        <ion-icon name="grid-outline" class="text-lg"></ion-icon> Dashboard
                    </a>
                    <a href="fee-management.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-slate-500 rounded-xl text-sm font-medium transition-all hover:bg-slate-100">
                        <ion-icon name="wallet-outline" class="text-lg"></ion-icon> Fee Management
                    </a>
                    <a href="student-records.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-slate-500 rounded-xl text-sm font-medium transition-all hover:bg-slate-100">
                        <ion-icon name="people-outline" class="text-lg"></ion-icon> Student Records
                    </a>
                    <a href="reports.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 bg-slate-100 text-slate-900 font-semibold rounded-xl text-sm transition-all hover:bg-slate-100">
                        <ion-icon name="bar-chart-outline" class="text-lg"></ion-icon> Reports
                    </a>
                </nav>
            </div>
        </aside>

        <main class="flex-1 bg-[#f8fafc] p-4 md:p-8 overflow-y-auto h-screen">
            <header class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-2xl font-bold">School Reports</h1>
                    <p class="text-slate-500 text-sm">Deep dive into financial and academic analytics.</p>
                </div>
                <div class="flex gap-2">
                    <button class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-semibold hover:bg-slate-50">Export PDF</button>
                    <button class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-semibold hover:bg-slate-50">Filter Date</button>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card p-6 rounded-[2rem]">
                    <h3 class="font-bold text-lg mb-2">Revenue Distribution</h3>
                    <p class="text-xs text-slate-400 mb-6">Breakdown of income sources</p>
                    <div class="h-64 flex items-center justify-center">
                        <canvas id="revenueReportChart"></canvas>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-[2rem]">
                    <h3 class="font-bold text-lg mb-2">Academic Performance</h3>
                    <p class="text-xs text-slate-400 mb-6">Average class performance by Form</p>
                    <div class="h-64">
                        <canvas id="performanceReportChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/modals.js"></script>
    <script src="../assets/js/charts.js"></script>
</body>
</html>
